<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>AIAgent SDK 第三方接入 demo (v2)</title>
  <style>
    body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; }
    #out { white-space: pre-wrap; border: 1px solid #ddd; padding: 12px; min-height: 80px; border-radius: 4px; background: #fafafa; }
    input, button { font: inherit; padding: 6px 10px; }
    .row { display: flex; gap: 8px; margin: 12px 0; }
    input[type=text] { flex: 1; }
    .meta { color: #888; font-size: 12px; }
    #sid { font-family: ui-monospace, "Cascadia Code", monospace; }
  </style>
</head>
<body>
  <h2>第三方网页接入 AI Agent demo (v2)</h2>
  <p>
    流程:浏览器 → 第三方 mock 后端 (7000) → AI Agent (8080)。<br>
    <strong>secret 永远不离开第三方后端 ↔ AI Agent 之间</strong>。
  </p>
  <p class="meta">当前会话:<code id="sid">未开始</code>
    <button id="new" style="padding: 2px 8px; font-size: 12px;">开新会话</button>
  </p>

  <div class="row">
    <input id="msg" type="text" value="用一句话介绍你自己" />
    <button id="send">发送</button>
  </div>
  <div id="out"></div>
  <div id="status" class="meta"></div>

  <script src="http://localhost:8080/sdk/ai-agent-sdk.js"></script>
  <script>
    var out = document.getElementById('out');
    var status = document.getElementById('status');
    var sidEl = document.getElementById('sid');
    var btn = document.getElementById('send');
    var newBtn = document.getElementById('new');
    var input = document.getElementById('msg');

    // 会话 ID 持久化在页面生命周期内,首次点击才生成。
    // 点"开新会话"才重置,实现多轮对话。
    var currentSid = null;
    function ensureSid() {
      if (!currentSid) {
        // 形如 demo-app:user-{ts},必须以 {clientId}: 开头
        currentSid = 'demo-app:user-' + Date.now();
        sidEl.textContent = currentSid;
      }
      return currentSid;
    }
    newBtn.addEventListener('click', function () {
      currentSid = null;
      sidEl.textContent = '未开始';
      out.textContent = '';
      status.textContent = '';
      input.focus();
    });

    var agent = AIAgent.init({
      endpoint: 'http://localhost:8080',
      // v2 关键:浏览器不持 secret,只调第三方自家后端换 token
      getAccessToken: async function () {
        var r = await fetch('http://localhost:7000/api/ai-token', { method: 'POST' });
        if (!r.ok) throw new Error('mock 后端换 token 失败: ' + r.status);
        var j = await r.json();
        return { accessToken: j.accessToken, refreshToken: j.refreshToken };
      }
    });

    btn.addEventListener('click', function () {
      var sid = ensureSid();
      status.textContent = 'requesting... (session ' + sid + ')';
      agent.stream({
        sessionId: sid,
        message: input.value,
        onChunk: function (ev) { out.append(ev.data || ''); },
        onDone:  function ()   { status.textContent = 'done (session ' + sid + ')'; },
        onError: function (e)  { status.textContent = 'error: ' + e.message; }
      });
    });

    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') btn.click();
    });
  </script>
</body>
</html>
