<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 平台管理端 - 登录</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-page">
    <div class="login-card">
        <h1>AI 平台管理端</h1>
        <p class="subtitle">管理员登录</p>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>
            <div id="errorMsg" class="error-msg" style="display:none"></div>
            <button type="submit" class="btn-primary" id="loginBtn">登录</button>
        </form>
    </div>
    <script src="js/api.js"></script>
    <script>
        // 已登录则跳转主页
        if (AdminAPI.getToken()) {
            window.location.href = '/admin/index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.textContent = '登录中...';
            errEl.style.display = 'none';

            try {
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const result = await AdminAPI.login(username, password);
                // 检查 scope 是否为 admin
                if (result.scope && result.scope.startsWith('admin:')) {
                    window.location.href = '/admin/index.html';
                } else {
                    errEl.textContent = '该账号无管理端访问权限';
                    errEl.style.display = 'block';
                    localStorage.removeItem('admin_token');
                }
            } catch (err) {
                errEl.textContent = err.message || '登录失败,请检查用户名和密码';
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        });
    </script>
</body>
</html>
