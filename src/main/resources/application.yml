server:
  port: 8080

spring:
  application:
    name: simple-ai-agent
  datasource:
    url: jdbc:h2:file:./data/agentscope;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
      hibernate.format_sql: true

# Anthropic-compatible gateway.
#
# The API key is NEVER committed. Two ways to provide it locally:
#   1. Env var:  set ANTHROPIC_API_KEY before starting the app
#   2. Override: create src/main/resources/application-local.yml (gitignored)
#                with the same structure and put the real key there.
agentscope:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model-name: MiniMax-M3
    base-url: https://api.minimaxi.com/anthropic
  session:
    storage-dir: ${user.home}/.agentscope/sessions
  agent:
    name: Assistant
    sys-prompt: "You are a helpful assistant. Keep answers concise."
    max-iters: 10
  jwt:
    # 启动时若文件不存在,自动生成 2048-bit RSA 密钥对并写入
    private-key-path: ${user.home}/.agentscope/jwt-private.pem
    public-key-path:  ${user.home}/.agentscope/jwt-public.pem
    issuer: simple-ai-agent
    ttl-seconds: 300
    refresh-ttl-seconds: 604800  # 7 天
  cors:
    allowed-origins:
      - http://localhost:5500
      - http://127.0.0.1:5500
      - http://localhost:63342
  demo:
    # 启动时预置的第三方应用凭据(便于 demo)。生产环境应改为通过管理接口创建。
    client-id: demo-app
    client-secret: demo-secret
    secret-bcrypt-cost: 10
  ratelimit:
    # 每个 clientId 桶的容量(瞬时 burst 上限)
    capacity: 60
    # 每秒补充的 token 数(0.2 = 12/分钟,0.05 = 3/分钟)
    refill-per-sec: 0.2

logging:
  level:
    io.agentscope: INFO
    com.example.agent: DEBUG
